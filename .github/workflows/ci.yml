name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Check and test on all platforms
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y cmake build-essential

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-cpu

      - name: cargo check (CPU)
        run: cargo check --workspace --no-default-features

      - name: cargo test
        run: cargo test --workspace --no-default-features

  # Clippy and format
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: sudo apt-get install -y cmake build-essential
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --no-default-features -- -D warnings

  # Metal build verification  (macOS only, no tests — just compiles) 
  build-metal:
    name: Build (Metal)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: brew install cmake
      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-metal
      - name: cargo build --features metal
        run: cargo build --release --bin maranoded --bin maranode --no-default-features --features metal
