[Maranode - Isolation Drift Detected]
search = sourcetype=maranode_cef sig_id=MRN-011 outcome=failure \
  | eval _time=rt/1000 \
  | table _time, src, auditSeq, cs3
alert.severity = 3
alert.suppress = 0
counttype = number of events
quantity = 0
relation = greater than
cron_schedule = */5 * * * *
enableSched = 1
description = Fires when an isolation probe reports egress (air-gap broken).

[Maranode - Workspace Crypto-Shred]
search = sourcetype=maranode_cef sig_id=MRN-050 \
  | eval _time=rt/1000 \
  | table _time, src, fname, auditSeq
alert.severity = 2
alert.suppress = 0
counttype = number of events
quantity = 0
relation = greater than
cron_schedule = */15 * * * *
enableSched = 1
description = Fires when a workspace DEK is destroyed.

[Maranode - Inference Failures (5 min window)]
search = sourcetype=maranode_cef sig_id=MRN-032 \
  | bucket _time span=5m \
  | stats count by _time, src
alert.severity = 2
alert.suppress = 0
counttype = number of events
quantity = 4
relation = greater than
cron_schedule = */5 * * * *
enableSched = 1
description = Fires when more than 4 inference failures occur in any 5-minute window.
